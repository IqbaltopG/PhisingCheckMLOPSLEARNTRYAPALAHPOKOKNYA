name: MLOps CI Pipeline - Phishing Scanner

# Pipeline ini bakal otomatis jalan tiap ada yang nge-push ke branch main
on:
  push:
    branches: [ "main" ]

jobs:
  security-and-build-check:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v3

    - name: 🐍 Set up Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🧪 Code Compilation & Syntax Check
      run: |
        python -m py_compile app.py
        echo "✅ Syntax OK! Tidak ada fatal error di script backend."

    - name: 🤖 Model Integrity Check
      run: |
        if [ -f "phishing_model.pkl" ]; then
            echo "✅ Model ML ditemukan di repository."
        else
            echo "❌ ERROR: Model ML hilang!"
            exit 1
        fi